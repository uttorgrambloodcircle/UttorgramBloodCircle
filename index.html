<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBC - Clock & Blood Directory</title>
    <style>
        :root { --primary: #e63946; --secondary: #1d3557; --bg: #f8fafc; --success: #22c55e; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); min-height: 95vh; }
        
        /* ঘড়ি ও ক্যালেন্ডার স্টাইল */
        .clock-widget { background: var(--secondary); color: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        #liveClock { font-size: 28px; font-weight: bold; margin-bottom: 5px; color: #facc15; }
        .date-row { font-size: 13px; display: flex; justify-content: space-around; opacity: 0.9; }

        .header { background: linear-gradient(135deg, var(--primary), #b91c1c); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; font-size: 16px; transition: 0.2s; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 15px; }
        .donor-card { text-align: left; background: #fff; border: 1px solid #f1f5f9; padding: 15px; margin: 12px 0; border-radius: 15px; border-left: 6px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.02); display: none; }
        .badge { background: var(--secondary); color: white; padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: bold; float: right; }
        .admin-view { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="clock-widget">
        <div id="liveClock">00:00:00</div>
        <div class="date-row">
            <div id="enDate">EN Date</div>
            <div id="bnDate">বাংলা তারিখ</div>
            <div id="arDate">আরবি তারিখ</div>
        </div>
    </div>

    <div class="header">
        <h2 style="margin:0;">উত্তর গ্রাম ব্লাড সার্কেল</h2>
        <p style="margin:5px 0 0 0; font-size: 13px;">নিরাপদ রক্তদাতা ব্যবস্থাপনা</p>
    </div>

    <div id="userUI">
        <button class="btn" style="background: var(--success);" onclick="toggleElement('regForm')">🩸 রক্তদাতা হিসেবে নাম লেখান</button>
        
        <div id="regForm" style="display:none; background: #fff1f2; padding: 15px; border-radius: 15px; border: 1px solid #fecaca; margin-bottom: 20px;">
            <input type="text" id="name" placeholder="আপনার পূর্ণ নাম">
            <input type="tel" id="phone" placeholder="মোবাইল নাম্বার">
            <select id="group">
                <option value="">রক্তের গ্রুপ</option>
                <option value="A+">A+</option><option value="B+">B+</option><option value="O+">O+</option><option value="AB+">AB+</option>
                <option value="A-">A-</option><option value="B-">B-</option><option value="O-">O-</option><option value="AB-">AB-</option>
            </select>
            <label style="font-size:12px; color:#666;">শেষ রক্তদানের তারিখ:</label>
            <input type="date" id="lastDate">
            <button class="btn" style="background: var(--primary);" onclick="sendToCloud()">তথ্য জমা দিন</button>
        </div>

        <div style="background: #f1f5f9; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
            <h4 style="margin:0 0 10px 0;">নিজের তথ্য খুঁজুন</h4>
            <input type="text" id="userSearch" placeholder="আপনার নাম বা ফোন নাম্বার লিখুন..." onkeyup="userFilter()">
            <p style="font-size: 11px; color: #666; margin-top: 5px;">সঠিক তথ্য দিলেই কেবল কার্ডটি দেখা যাবে।</p>
        </div>

        <div id="publicList">লোড হচ্ছে...</div>
    </div>

    <button class="btn" style="background: #94a3b8; margin-top: 40px; font-size: 12px;" onclick="checkAdmin()">🔒 এডমিন প্যানেল</button>

    <div id="adminPanel" class="admin-view">
        <h3 style="color: var(--primary);">মাস্টার ডাটাবেস (এডমিন)</h3>
        <input type="text" id="adminSearch" placeholder="নাম বা গ্রুপ দিয়ে সার্চ দিন..." onkeyup="adminFilter()">
        <div id="adminDataList"></div>
        <button class="btn" style="background: #1e293b;" onclick="location.reload()">লগআউট</button>
    </div>
</div>

<script>
    const dbURL = "https://ubc-database-default-rtdb.firebaseio.com/donors.json";
    let allDonors = {};

    // লাইভ ঘড়ি ও তারিখ ফাংশন
    function updateClock() {
        const now = new Date();
        // ঘড়ি
        document.getElementById('liveClock').innerText = now.toLocaleTimeString('bn-BD');
        
        // ইংরেজি তারিখ
        const enOptions = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('enDate').innerText = now.toLocaleDateString('en-GB', enOptions);
        
        // আরবি তারিখ
        const arOptions = { day: 'numeric', month: 'long', year: 'numeric', calendar: 'islamic-uma' };
        document.getElementById('arDate').innerText = now.toLocaleDateString('ar-SA-u-ca-islamic-uma', arOptions);

        // বাংলা তারিখ (সহজ পদ্ধতি)
        const bnOptions = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('bnDate').innerText = now.toLocaleDateString('bn-BD', bnOptions);
    }
    setInterval(updateClock, 1000);

    function toggleElement(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    async function loadData() {
        try {
            const res = await fetch(dbURL);
            allDonors = await res.json() || {};
            displayPublic();
        } catch (e) { console.log("Load failed"); }
    }

    function displayPublic() {
        const div = document.getElementById('publicList');
        div.innerHTML = "";
        for(let id in allDonors) {
            let d = allDonors[id];
            const days = calculateDays(d.lastDate);
            div.innerHTML += `
                <div class="donor-card user-card" data-key="${d.name} ${d.phone}">
                    <span class="badge">${d.group}</span>
                    <b style="font-size: 18px; color: var(--secondary);">${d.name}</b><br>
                    <p style="margin: 10px 0 0 0; font-size: 14px;">
                        <span style="color:#64748b; font-weight:bold;">রক্তদানের পর অতিবাহিত:</span> <span style="color:red; font-weight:bold;">${days} দিন</span><br>
                        <span style="color:#64748b; font-weight:bold;">মোবাইল:</span> ${d.phone}
                    </p>
                </div>
            `;
        }
    }

    function userFilter() {
        const q = document.getElementById('userSearch').value.trim().toUpperCase();
        const cards = document.getElementsByClassName('user-card');
        for(let card of cards) {
            if(q.length > 2 && card.getAttribute('data-key').toUpperCase().includes(q)) {
                card.style.display = "block";
            } else { card.style.display = "none"; }
        }
    }

    function calculateDays(dateString) {
        const last = new Date(dateString);
        const today = new Date();
        const diff = today - last;
        return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    async function sendToCloud() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const group = document.getElementById('group').value;
        const lastDate = document.getElementById('lastDate').value;
        if(!name || !phone || !group || !lastDate) return alert("সব তথ্য পূরণ করুন!");
        const data = { name, phone, group, lastDate };
        try {
            await fetch(dbURL, { method: 'POST', body: JSON.stringify(data) });
            alert("সংরক্ষিত হয়েছে!");
            location.reload();
        } catch (e) { alert("ব্যর্থ হয়েছে!"); }
    }

    function checkAdmin() {
        const pin = prompt("এডমিন পিন দিন:");
        if(pin === "42546ubc") {
            document.getElementById('userUI').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            displayAdmin();
        } else { alert("ভুল পিন!"); }
    }

    function displayAdmin() {
        const div = document.getElementById('adminDataList');
        div.innerHTML = "";
        for(let id in allDonors) {
            let d = allDonors[id];
            div.innerHTML += `
                <div class="donor-card admin-card" style="display:block; border-left-color: #22c55e;" data-key="${d.name} ${d.group}">
                    <span class="badge" style="background:#22c55e">${d.group}</span>
                    <b>${d.name}</b><br>
                    📞 <a href="tel:${d.phone}" style="color:var(--primary); font-weight:bold;">${d.phone}</a><br>
                    📅 তারিখ: ${d.lastDate}<br>
                    <button onclick="deleteEntry('${id}')" style="margin-top:10px; color:red; border:1px solid red; background:none; padding:4px; border-radius:5px; cursor:pointer;">ডিলিট</button>
                </div>
            `;
        }
    }

    function adminFilter() {
        const q = document.getElementById('adminSearch').value.toUpperCase();
        const cards = document.getElementsByClassName('admin-card');
        for(let card of cards) {
            card.getAttribute('data-key').toUpperCase().includes(q) ? card.style.display="block" : card.style.display="none";
        }
    }

    async function deleteEntry(id) {
        if(confirm("মুছে ফেলবেন?")) {
            await fetch(`https://ubc-database-default-rtdb.firebaseio.com/donors/${id}.json`, { method: 'DELETE' });
            location.reload();
        }
    }

    window.onload = () => { loadData(); updateClock(); };
</script>
</body>
</html>
