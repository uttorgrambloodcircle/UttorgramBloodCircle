<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBC - Pro Blood Directory</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #e63946; --secondary: #1d3557; --success: #2a9d8f; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 80px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, var(--primary), #b91c1c); color: white; padding: 20px; text-align: center; border-radius: 0 0 25px 25px; }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid white; background: white; }
        .alert-text { background: #fff5f5; color: #d32f2f; padding: 12px; margin: 10px; border-radius: 12px; border: 1px solid #feb2b2; font-size: 13px; font-weight: bold; text-align: center; }
        .widget-box { background: #fff; margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid #eee; }
        .date-row { font-size: 14px; font-weight: bold; color: #444; margin: 5px 0; border-bottom: 1px dashed #eee; padding-bottom: 3px; }
        .entry-box { background: #f8f9fa; margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid #ddd; }
        .entry-box input, .entry-box select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .donor-card { background: white; border: 1px solid #eee; margin: 10px; padding: 12px; border-radius: 15px; display: flex; align-items: center; border-left: 5px solid var(--primary); }
        .donor-img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; margin-right: 15px; background: #f0f0f0; }
        .btn-upload { background: #6c757d; color: white; padding: 8px; font-size: 12px; border-radius: 5px; cursor: pointer; display: inline-block; margin: 5px 0; width: 100%; text-align: center; }
        .btn-save { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.ibb.co.com/FbYB4J3W/20241022-122323-removebg-preview.png" class="logo">
        <h2 style="margin:5px 0;">উত্তর গ্রাম ব্লাড সার্কেল</h2>
        <div id="liveClock" style="font-size: 22px; font-weight: bold;">০০:০০:০০</div>
    </div>

    <div class="alert-text">📢 গর্ভবতী মায়ের জন্য রক্তদাতা আগে থেকেই জোগাড় রাখুন।</div>

    <div class="widget-box">
        <div id="enD" class="date-row">লোড হচ্ছে...</div>
        <div id="bnD" class="date-row">লোড হচ্ছে...</div>
        <div id="arD" class="date-row">লোড হচ্ছে...</div>
        <div id="eventToday" style="font-size: 13px; color: var(--primary); font-weight: bold; margin-top: 5px;"></div>
    </div>

    <div class="entry-box">
        <h4 style="margin:0 0 10px; text-align:center;">🩸 নতুন ডোনার এন্ট্রি</h4>
        <input type="text" id="dName" placeholder="ডোনারের নাম">
        <input type="tel" id="dPhone" placeholder="ফোন নাম্বার">
        
        <label class="btn-upload">
            📷 ছবি আপলোড করুন (গ্যালারি/ক্যামেরা)
            <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="uploadImage(this)">
        </label>
        <input type="hidden" id="imageUrl">
        <div id="uploadStatus" style="font-size: 11px; color: green; text-align: center;"></div>

        <select id="dGroup">
            <option value="">রক্তের গ্রুপ</option>
            <option value="A+">A+</option><option value="B+">B+</option><option value="O+">O+</option><option value="AB+">AB+</option>
            <option value="A-">A-</option><option value="B-">B-</option><option value="O-">O-</option><option value="AB-">AB-</option>
        </select>
        <label style="font-size: 12px;">শেষ রক্তদানের তারিখ:</label>
        <input type="date" id="dDate">
        <button class="btn-save" onclick="saveDonor()">তথ্য সেভ করুন</button>
    </div>

    <div id="donorList">লোড হচ্ছে...</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://ubc-database-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- ইমেজ আপলোড ফাংশন (ImgBB API ব্যবহার করা হয়েছে) ---
    async function uploadImage(input) {
        const status = document.getElementById('uploadStatus');
        status.innerText = "ছবি আপলোড হচ্ছে, দয়া করে অপেক্ষা করুন...";
        
        const file = input.files[0];
        const formData = new FormData();
        formData.append('image', file);

        // এখানে একটি ফ্রি API কী ব্যবহার করা হয়েছে
        try {
            const response = await fetch('https://api.imgbb.com/1/upload?key=8e6840656094251268f7009867905786', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if(result.success) {
                document.getElementById('imageUrl').value = result.data.url;
                status.innerText = "✅ ছবি আপলোড সফল!";
            }
        } catch (error) {
            status.innerText = "❌ আপলোড ব্যর্থ! আবার চেষ্টা করুন।";
        }
    }

    // --- তারিখ আপডেট ফাংশন ---
    function updateDateTime() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString('bn-BD');

        document.getElementById('enD').innerText = "📅 ইংরেজি: " + now.toLocaleDateString('bn-BD', {day:'numeric', month:'long', year:'numeric'}) + " (" + now.toLocaleDateString('bn-BD', {weekday:'long'}) + ")";
        
        const bnDate = now.toLocaleDateString('bn-BD-u-ca-bengali', {day:'numeric', month:'long', year:'numeric'});
        document.getElementById('bnD').innerText = "🌾 বাংলা: " + bnDate;

        const arParts = new Intl.DateTimeFormat('en-u-ca-islamic-uma', {day:'numeric', month:'long', year:'numeric'}).formatToParts(now);
        let arString = arParts.map(p => p.value).join('');
        document.getElementById('arD').innerText = "🌙 হিজরি: " + now.toLocaleDateString('bn-BD-u-ca-islamic-uma', {day:'numeric', month:'long', year:'numeric'});
    }

    // --- ডাটা সেভ এবং লোড ---
    function saveDonor() {
        const name = document.getElementById('dName').value;
        const phone = document.getElementById('dPhone').value;
        const group = document.getElementById('dGroup').value;
        const date = document.getElementById('dDate').value;
        const img = document.getElementById('imageUrl').value;

        if(name && phone && date) {
            db.ref('donors').push({ name, phone, group, lastDate: date, img: img });
            alert("সফলভাবে সেভ হয়েছে!");
            location.reload();
        } else { alert("সব তথ্য পূরণ করুন!"); }
    }

    function loadData() {
        db.ref('donors').on('value', snap => {
            const list = document.getElementById('donorList');
            list.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const diff = Math.floor((new Date() - new Date(d.lastDate)) / 86400000);
                list.innerHTML += `
                    <div class="donor-card">
                        <img src="${d.img || 'https://via.placeholder.com/65'}" class="donor-img">
                        <div class="donor-info">
                            <b>${d.name}</b>
                            <small>গ্রুপ: ${d.group} | ফোন: ${d.phone}</small>
                            <div style="color:red; font-size:12px; font-weight:bold;">
                                ${diff >= 90 ? "❤️ পুনরায় রক্ত দেওয়ার সময় হয়েছে" : "অবস্থা: নিরাপদ ("+diff+" দিন)"}
                            </div>
                        </div>
                    </div>`;
            });
        });
    }

    setInterval(updateDateTime, 1000);
    window.onload = () => { updateDateTime(); loadData(); };
</script>
</body>
</html>
