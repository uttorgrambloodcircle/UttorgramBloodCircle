<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBC - Pro Blood Directory</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #e63946; --secondary: #1d3557; --success: #2a9d8f; --accent: #ffb703; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 80px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, var(--primary), #b91c1c); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid white; margin-bottom: 10px; background: white; }
        .widget-box { background: #fff; margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .clock { font-size: 28px; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        .date-row { font-size: 15px; font-weight: 600; color: #444; margin: 5px 0; border-bottom: 1px dashed #eee; padding-bottom: 3px; }
        .alert-text { background: #fff5f5; color: #d32f2f; padding: 12px; margin: 10px; border-radius: 12px; border: 1px solid #feb2b2; font-size: 13px; font-weight: bold; text-align: center; }
        .donor-card { background: white; border: 1px solid #eee; margin: 10px; padding: 12px; border-radius: 15px; display: flex; align-items: center; border-left: 5px solid var(--primary); }
        .donor-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-right: 15px; background: #f9f9f9; }
        .report-section { display: flex; justify-content: space-around; padding: 15px; background: var(--secondary); color: white; margin: 10px; border-radius: 15px; font-size: 12px; text-align: center; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="https://i.ibb.co.com/FbYB4J3W/20241022-122323-removebg-preview.png" class="logo">
        <h2 style="margin:0; font-size: 22px;">উত্তর গ্রাম ব্লাড সার্কেল</h2>
        <div id="liveClock" class="clock">০০:০০:০০</div>
    </div>
    <div class="alert-text">📢 গর্ভবতী মায়ের জন্য রক্তদাতা আগে থেকেই জোগাড় রাখুন।</div>
    <div class="widget-box">
        <div id="enD" class="date-row">লোড হচ্ছে...</div>
        <div id="bnD" class="date-row">লোড হচ্ছে...</div>
        <div id="arD" class="date-row">লোড হচ্ছে...</div>
        <div id="dayN" style="color:var(--primary); font-weight:bold; margin-top:8px;"></div>
    </div>
    <div id="reportBox" class="report-section">
        <div>আজকের ম্যানেজ<br><b id="repD">০</b></div>
        <div>এই মাসে মোট<br><b id="repM">০</b></div>
        <div>এই বছরে মোট<br><b id="repY">০</b></div>
    </div>
    <div id="donorList" style="padding: 10px;">লোড হচ্ছে...</div>
</div>
<script>
    const firebaseConfig = { databaseURL: "https://ubc-database-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function getBengaliSeason(month) {
        const seasons = ["শীত", "শীত", "বসন্ত", "বসন্ত", "গ্রীষ্ম", "গ্রীষ্ম", "বর্ষা", "বর্ষা", "শরৎ", "শরৎ", "হেমন্ত", "হেমন্ত"];
        return seasons[month];
    }
    const hijriMonthsBN = ["মুহররম", "সফর", "রবিউল আউয়াল", "রবিউস সানি", "জুমাদাল উলা", "জুমাদাল উখরা", "রজব", "শাবান", "রমজান", "শাওয়াল", "জিলকদ", "জিলহজ"];

    function updateDateTime() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString('bn-BD');
        
        // ইংরেজি তারিখ
        const enDate = now.toLocaleDateString('bn-BD', { day: 'numeric', month: 'long', year: 'numeric' });
        const dayName = now.toLocaleDateString('bn-BD', { weekday: 'long' });
        document.getElementById('enD').innerText = "📅 ইংরেজি: " + enDate + " খ্রী. (রোজ " + dayName + ")";
        
        // বাংলা তারিখ
        const bnDate = now.toLocaleDateString('bn-BD-u-ca-bengali', { day: 'numeric', month: 'long', year: 'numeric' });
        const season = getBengaliSeason(now.getMonth());
        document.getElementById('bnD').innerText = "🌾 বাংলা: " + bnDate + " বঙ্গাব্দ (" + season + "কাল)";
        
        // হিজরি তারিখ
        const arParts = new Intl.DateTimeFormat('en-u-ca-islamic-uma', {day:'numeric', month:'numeric', year:'numeric'}).formatToParts(now);
        const arDay = parseInt(arParts.find(p => p.type === 'day').value).toLocaleString('bn-BD');
        const arMonth = hijriMonthsBN[parseInt(arParts.find(p => p.type === 'month').value) - 1];
        const arYear = parseInt(arParts.find(p => p.type === 'year').value).toLocaleString('bn-BD');
        document.getElementById('arD').innerText = "🌙 হিজরি: " + arDay + " " + arMonth + ", " + arYear + " হিজরি";
    }

    setInterval(updateDateTime, 1000);
    function loadData() {
        db.ref('donors').on('value', snap => {
            let list = document.getElementById('donorList'); list.innerHTML = "";
            snap.forEach(c => {
                let d = c.val();
                list.innerHTML += `<div class="donor-card"><img src="${d.img || 'https://via.placeholder.com/60'}" class="donor-img"><div><b>${d.name}</b><br><small>গ্রুপ: ${d.group}</small></div></div>`;
            });
        });
    }
    window.onload = () => { updateDateTime(); loadData(); };
</script>
</body>
</html>
